AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  NewsSummaries - Serverless pipeline that ingests news, generates AI summaries,
  converts to audio, and distributes via CloudFront and RSS feed.

Globals:
  Function:
    Runtime: python3.11
    Architectures:
      - arm64
    Timeout: 300
    MemorySize: 512
    Environment:
      Variables:
        STAGE: !Ref Stage
        S3_BUCKET_NAME: !Sub "news-summaries-${Stage}"
        DYNAMODB_TABLE_NAME: !Sub "news-summaries-episodes-${Stage}"
        LOG_LEVEL: !If [IsProd, "INFO", "DEBUG"]
    Layers:
      - !Ref SharedLayer

Parameters:
  Stage:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
    Description: Deployment stage

  OpenAIApiKeyParam:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /news-summaries/openai-api-key
    Description: SSM Parameter Store path for OpenAI API key

  NewsApiKeyParam:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /news-summaries/news-api-key
    Description: SSM Parameter Store path for News API key

  PodcastTitle:
    Type: String
    Default: "News Summaries"

  PodcastDescription:
    Type: String
    Default: "Daily AI-powered news summaries"

  PodcastAuthor:
    Type: String
    Default: "News Summaries Bot"

  PodcastEmail:
    Type: String
    Default: "podcast@example.com"

  AlertEmail:
    Type: String
    Default: "alerts@example.com"
    Description: Email address for CloudWatch alarm notifications

Conditions:
  IsProd: !Equals [!Ref Stage, prod]

Resources:

  # ─────────────────────────────────────────────
  # S3 Bucket
  # ─────────────────────────────────────────────
  NewsSummariesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "news-summaries-${Stage}"
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToIA
            Status: Enabled
            Transitions:
              - TransitionInDays: 30
                StorageClass: STANDARD_IA
            NoncurrentVersionTransitions:
              - TransitionInDays: 7
                StorageClass: STANDARD_IA
          - Id: DeleteOldObjects
            Status: Enabled
            ExpirationInDays: 90
            NoncurrentVersionExpiration:
              NoncurrentDays: 30
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ["*"]
            AllowedMethods: [GET, HEAD]
            AllowedOrigins: ["*"]
            MaxAge: 3600
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: "s3:ObjectCreated:*"
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: raw/
            Function: !GetAtt GenerateSummariesFunction.Arn

  NewsSummariesBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref NewsSummariesBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${NewsSummariesBucket.Arn}/audio/*"
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  # ─────────────────────────────────────────────
  # DynamoDB Table
  # ─────────────────────────────────────────────
  EpisodesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "news-summaries-episodes-${Stage}"
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      AttributeDefinitions:
        - AttributeName: episode_id
          AttributeType: S
        - AttributeName: date
          AttributeType: S
        - AttributeName: category
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: episode_id
          KeyType: HASH
        - AttributeName: date
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: date-created_at-index
          KeySchema:
            - AttributeName: date
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: category-date-index
          KeySchema:
            - AttributeName: category
              KeyType: HASH
            - AttributeName: date
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ─────────────────────────────────────────────
  # SQS Dead Letter Queues
  # ─────────────────────────────────────────────
  IngestNewsDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "news-summaries-ingest-dlq-${Stage}"
      MessageRetentionPeriod: 1209600  # 14 days
      KmsMasterKeyId: alias/aws/sqs

  GenerateSummariesDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "news-summaries-summaries-dlq-${Stage}"
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: alias/aws/sqs

  GenerateAudioDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "news-summaries-audio-dlq-${Stage}"
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: alias/aws/sqs

  # ─────────────────────────────────────────────
  # SNS Alerting
  # ─────────────────────────────────────────────
  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "news-summaries-alerts-${Stage}"
      Subscription:
        - Protocol: email
          Endpoint: !Ref AlertEmail

  # ─────────────────────────────────────────────
  # Shared Lambda Layer
  # ─────────────────────────────────────────────
  SharedLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub "news-summaries-shared-${Stage}"
      Description: Shared utilities for NewsSummaries Lambda functions
      ContentUri: src/shared/
      CompatibleRuntimes:
        - python3.11
      RetentionPolicy: Delete
    Metadata:
      BuildMethod: python3.11

  # ─────────────────────────────────────────────
  # Lambda: IngestNews
  # ─────────────────────────────────────────────
  IngestNewsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "news-summaries-ingest-${Stage}"
      CodeUri: src/ingest_news/
      Handler: handler.lambda_handler
      Description: Fetches news from RSS feeds and NewsAPI, stores raw articles in S3
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt IngestNewsDLQ.Arn
      Environment:
        Variables:
          OPENAI_API_KEY: !Ref OpenAIApiKeyParam
          NEWS_API_KEY: !Ref NewsApiKeyParam
          GENERATE_SUMMARIES_FUNCTION: !Sub "news-summaries-summaries-${Stage}"
      Policies:
        - S3WritePolicy:
            BucketName: !Sub "news-summaries-${Stage}"
        - SSMParameterReadPolicy:
            ParameterName: "news-summaries/*"
        - SQSSendMessagePolicy:
            QueueName: !GetAtt IngestNewsDLQ.QueueName
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt GenerateSummariesFunction.Arn
      Events:
        MorningSchedule:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: "cron(0 6 * * ? *)"
            Description: Morning news ingest at 6 AM UTC
            RetryPolicy:
              MaximumRetryAttempts: 2
              MaximumEventAgeInSeconds: 3600
            DeadLetterConfig:
              Arn: !GetAtt IngestNewsDLQ.Arn
        EveningSchedule:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: "cron(0 18 * * ? *)"
            Description: Evening news ingest at 6 PM UTC
            RetryPolicy:
              MaximumRetryAttempts: 2
              MaximumEventAgeInSeconds: 3600
            DeadLetterConfig:
              Arn: !GetAtt IngestNewsDLQ.Arn

  IngestNewsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/news-summaries-ingest-${Stage}"
      RetentionInDays: !If [IsProd, 90, 14]

  IngestNewsErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "news-summaries-ingest-errors-${Stage}"
      AlarmDescription: IngestNews Lambda function errors
      MetricName: Errors
      Namespace: AWS/Lambda
      Dimensions:
        - Name: FunctionName
          Value: !Ref IngestNewsFunction
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 3
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref AlertTopic
      TreatMissingData: notBreaching

  # ─────────────────────────────────────────────
  # Lambda: GenerateSummaries
  # ─────────────────────────────────────────────
  GenerateSummariesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "news-summaries-summaries-${Stage}"
      CodeUri: src/generate_summaries/
      Handler: handler.lambda_handler
      Description: Reads raw articles from S3, generates summaries using OpenAI o3-mini
      Timeout: 600
      MemorySize: 1024
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt GenerateSummariesDLQ.Arn
      Environment:
        Variables:
          OPENAI_API_KEY: !Ref OpenAIApiKeyParam
      Policies:
        - S3ReadPolicy:
            BucketName: !Sub "news-summaries-${Stage}"
        - S3WritePolicy:
            BucketName: !Sub "news-summaries-${Stage}"
        - DynamoDBWritePolicy:
            TableName: !Sub "news-summaries-episodes-${Stage}"
        - SSMParameterReadPolicy:
            ParameterName: "news-summaries/*"
        - SQSSendMessagePolicy:
            QueueName: !GetAtt GenerateSummariesDLQ.QueueName

  GenerateSummariesPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt GenerateSummariesFunction.Arn
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !GetAtt NewsSummariesBucket.Arn

  GenerateSummariesLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/news-summaries-summaries-${Stage}"
      RetentionInDays: !If [IsProd, 90, 14]

  GenerateSummariesErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "news-summaries-summaries-errors-${Stage}"
      AlarmDescription: GenerateSummaries Lambda function errors
      MetricName: Errors
      Namespace: AWS/Lambda
      Dimensions:
        - Name: FunctionName
          Value: !Ref GenerateSummariesFunction
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref AlertTopic
      TreatMissingData: notBreaching

  # ─────────────────────────────────────────────
  # Lambda: GenerateAudio
  # ─────────────────────────────────────────────
  GenerateAudioFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "news-summaries-audio-${Stage}"
      CodeUri: src/generate_audio/
      Handler: handler.lambda_handler
      Description: Converts summaries to audio using OpenAI TTS, updates RSS feed
      Timeout: 600
      MemorySize: 1024
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt GenerateAudioDLQ.Arn
      Environment:
        Variables:
          OPENAI_API_KEY: !Ref OpenAIApiKeyParam
          CLOUDFRONT_DOMAIN: !GetAtt CloudFrontDistribution.DomainName
          PODCAST_TITLE: !Ref PodcastTitle
          PODCAST_DESCRIPTION: !Ref PodcastDescription
          PODCAST_AUTHOR: !Ref PodcastAuthor
          PODCAST_EMAIL: !Ref PodcastEmail
      Policies:
        - S3ReadPolicy:
            BucketName: !Sub "news-summaries-${Stage}"
        - S3WritePolicy:
            BucketName: !Sub "news-summaries-${Stage}"
        - DynamoDBCrudPolicy:
            TableName: !Sub "news-summaries-episodes-${Stage}"
        - SSMParameterReadPolicy:
            ParameterName: "news-summaries/*"
        - SQSSendMessagePolicy:
            QueueName: !GetAtt GenerateAudioDLQ.QueueName
      Events:
        DynamoDBStream:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt EpisodesTable.StreamArn
            StartingPosition: TRIM_HORIZON
            BatchSize: 10
            FilterCriteria:
              Filters:
                - Pattern: '{"eventName": ["INSERT"], "dynamodb": {"NewImage": {"audio_url": {"NULL": [true]}}}}'
            FunctionResponseTypes:
              - ReportBatchItemFailures
            DestinationConfig:
              OnFailure:
                Destination: !GetAtt GenerateAudioDLQ.Arn

  GenerateAudioLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/news-summaries-audio-${Stage}"
      RetentionInDays: !If [IsProd, 90, 14]

  GenerateAudioErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "news-summaries-audio-errors-${Stage}"
      AlarmDescription: GenerateAudio Lambda function errors
      MetricName: Errors
      Namespace: AWS/Lambda
      Dimensions:
        - Name: FunctionName
          Value: !Ref GenerateAudioFunction
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref AlertTopic
      TreatMissingData: notBreaching

  # ─────────────────────────────────────────────
  # CloudFront Distribution
  # ─────────────────────────────────────────────
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "news-summaries-oac-${Stage}"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub "NewsSummaries audio delivery - ${Stage}"
        Enabled: true
        HttpVersion: http2and3
        IPV6Enabled: true
        DefaultCacheBehavior:
          TargetOriginId: S3AudioOrigin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          OriginRequestPolicyId: 88a5eaf4-2fd4-4709-b370-b4c650ea3fcf  # CORS-S3Origin
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD, OPTIONS]
          Compress: true
        Origins:
          - Id: S3AudioOrigin
            DomainName: !GetAtt NewsSummariesBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        PriceClass: PriceClass_100
        Logging:
          Bucket: !GetAtt NewsSummariesBucket.RegionalDomainName
          Prefix: cloudfront-logs/
          IncludeCookies: false

  # ─────────────────────────────────────────────
  # CloudWatch Dashboard
  # ─────────────────────────────────────────────
  MonitoringDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub "NewsSummaries-${Stage}"
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "properties": {
                "title": "Lambda Invocations",
                "metrics": [
                  ["AWS/Lambda", "Invocations", "FunctionName", "news-summaries-ingest-${Stage}"],
                  ["AWS/Lambda", "Invocations", "FunctionName", "news-summaries-summaries-${Stage}"],
                  ["AWS/Lambda", "Invocations", "FunctionName", "news-summaries-audio-${Stage}"]
                ],
                "period": 3600,
                "stat": "Sum",
                "view": "timeSeries"
              }
            },
            {
              "type": "metric",
              "properties": {
                "title": "Lambda Errors",
                "metrics": [
                  ["AWS/Lambda", "Errors", "FunctionName", "news-summaries-ingest-${Stage}"],
                  ["AWS/Lambda", "Errors", "FunctionName", "news-summaries-summaries-${Stage}"],
                  ["AWS/Lambda", "Errors", "FunctionName", "news-summaries-audio-${Stage}"]
                ],
                "period": 3600,
                "stat": "Sum",
                "view": "timeSeries"
              }
            },
            {
              "type": "metric",
              "properties": {
                "title": "Lambda Duration (P95)",
                "metrics": [
                  ["AWS/Lambda", "Duration", "FunctionName", "news-summaries-ingest-${Stage}", {"stat": "p95"}],
                  ["AWS/Lambda", "Duration", "FunctionName", "news-summaries-summaries-${Stage}", {"stat": "p95"}],
                  ["AWS/Lambda", "Duration", "FunctionName", "news-summaries-audio-${Stage}", {"stat": "p95"}]
                ],
                "period": 3600,
                "view": "timeSeries"
              }
            }
          ]
        }

Outputs:
  BucketName:
    Description: S3 bucket name
    Value: !Ref NewsSummariesBucket
    Export:
      Name: !Sub "${AWS::StackName}-BucketName"

  DynamoDBTableName:
    Description: DynamoDB table name
    Value: !Ref EpisodesTable
    Export:
      Name: !Sub "${AWS::StackName}-DynamoDBTableName"

  CloudFrontDomain:
    Description: CloudFront distribution domain name
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: !Sub "${AWS::StackName}-CloudFrontDomain"

  CloudFrontDistributionId:
    Description: CloudFront distribution ID
    Value: !Ref CloudFrontDistribution

  IngestNewsFunctionArn:
    Description: IngestNews Lambda ARN
    Value: !GetAtt IngestNewsFunction.Arn

  GenerateSummariesFunctionArn:
    Description: GenerateSummaries Lambda ARN
    Value: !GetAtt GenerateSummariesFunction.Arn

  GenerateAudioFunctionArn:
    Description: GenerateAudio Lambda ARN
    Value: !GetAtt GenerateAudioFunction.Arn

  RssFeedUrl:
    Description: RSS feed URL via CloudFront
    Value: !Sub "https://${CloudFrontDistribution.DomainName}/rss/feed.xml"
