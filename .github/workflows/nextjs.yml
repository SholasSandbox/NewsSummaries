name: 'Next.js CI'
# Runs type-check, lint, and build for the web/ Next.js app.
# Triggered by any changes under web/ or this workflow file.
#
# No external secrets are required for CI — the build uses placeholder
# env vars so Next.js does not error on missing AWS config at build time.
#
# Deployment:
#   This workflow performs CI only (type-check → lint → build).
#   For production deployment, trigger the terraform.yml workflow which
#   handles the full AWS infrastructure deploy via Terraform + OIDC.

on:
  push:
    branches: ["main"]
    paths:
      - "web/**"
      - ".github/workflows/nextjs.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "web/**"
      - ".github/workflows/nextjs.yml"

defaults:
  run:
    working-directory: web

env:
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────
  # TypeScript type-check
  # ─────────────────────────────────────────────
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npm run type-check

  # ─────────────────────────────────────────────
  # ESLint
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: type-check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

  # ─────────────────────────────────────────────
  # Production build (catches compile errors)
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        # Stub AWS env vars so the build does not fail due to missing config.
        # At runtime these are provided by the deployment environment.
        env:
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: placeholder
          AWS_SECRET_ACCESS_KEY: placeholder
          DYNAMODB_TABLE_NAME: placeholder
          CLOUDFRONT_DOMAIN: placeholder.cloudfront.net
          ANTHROPIC_API_KEY: placeholder
          OPENAI_API_KEY: placeholder
          FIRECRAWL_API_KEY: placeholder
          GENERATE_SUMMARIES_FUNCTION_NAME: placeholder
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build-${{ github.sha }}
          path: web/.next/
          retention-days: 7
