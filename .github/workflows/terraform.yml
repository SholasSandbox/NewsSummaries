name: 'Terraform'
# Runs Terraform fmt, validate, and plan on every PR.
# Applies to the dev environment automatically on push to main.
# Prod deploys are triggered manually via workflow_dispatch.
#
# Required GitHub secrets:
#   AWS_DEPLOY_ROLE_ARN_DEV   – IAM role ARN for dev deploys (OIDC)
#   AWS_DEPLOY_ROLE_ARN_PROD  – IAM role ARN for prod deploys (OIDC)
#   TF_VAR_openai_api_key     – OpenAI API key
#   TF_VAR_news_api_key       – NewsAPI.org key (or "DISABLED")
#   TF_STATE_BUCKET           – S3 bucket name for Terraform remote state
#   ALERT_EMAIL               – (optional) email for CloudWatch alarms

on:
  push:
    branches: ["main"]
    paths:
      - "terraform/**"
      - "src/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "terraform/**"
      - "src/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, prod]

permissions:
  contents: read
  id-token: write   # Required for OIDC credential exchange
  pull-requests: write  # Required to post plan output as PR comment

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.7.5"
  TF_WORKING_DIR: terraform
  PYTHON_VERSION: "3.11"

jobs:
  # ─────────────────────────────────────────────
  # Lint Python source code
  # ─────────────────────────────────────────────
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: pip install flake8 black isort

      - name: Run flake8
        run: flake8 src/ tests/ --max-line-length 120 --extend-ignore=E203,W503

      - name: Check black formatting
        run: black --check src/ tests/

      - name: Check isort import ordering
        run: isort --check-only src/ tests/

  # ─────────────────────────────────────────────
  # Unit Tests
  # ─────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install feedparser==6.0.11 requests==2.31.0 openai==1.12.0 boto3==1.34.0
          pip install -r tests/requirements.txt

      - name: Run unit tests
        run: |
          pytest tests/unit/ \
            --cov=src \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --junitxml=test-results.xml \
            -v
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
          S3_BUCKET_NAME: test-news-summaries
          DYNAMODB_TABLE_NAME: test-news-summaries-episodes
          CLOUDFRONT_DOMAIN: d1234567890.cloudfront.net
          OPENAI_API_KEY: sk-test-fake
          NEWS_API_KEY: DISABLED
          ADMIN_API_KEY: ""
          STAGE: test
          LOG_LEVEL: DEBUG

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml

  # ─────────────────────────────────────────────
  # Terraform format, validate, and plan
  # ─────────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (for Lambda build step)
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Configure AWS credentials via OIDC (dev)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: NewsSummaries-TerraformPlan-${{ github.run_id }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=news-summaries/dev/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file="terraform.tfvars" \
            -var="openai_api_key=${{ secrets.TF_VAR_openai_api_key }}" \
            -var="news_api_key=${{ secrets.TF_VAR_news_api_key }}" \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
            -input=false \
            -out=tfplan \
            -no-color 2>&1 | tee plan.txt
        continue-on-error: true

      - name: Post plan to PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan.txt', 'utf8');
            const maxLen = 65000;
            const body = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n\n...(truncated)'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan — dev\n\`\`\`\n${body}\n\`\`\``
            });

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ─────────────────────────────────────────────
  # Deploy to Dev (push to main)
  # ─────────────────────────────────────────────
  deploy-dev:
    name: Deploy → Dev
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: dev
    concurrency:
      group: deploy-dev
      cancel-in-progress: false
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (for Lambda build step)
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: NewsSummaries-DeployDev-${{ github.run_id }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=news-summaries/dev/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Apply
        run: |
          terraform apply \
            -var-file="terraform.tfvars" \
            -var="openai_api_key=${{ secrets.TF_VAR_openai_api_key }}" \
            -var="news_api_key=${{ secrets.TF_VAR_news_api_key }}" \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
            -input=false \
            -auto-approve

      - name: Print outputs
        run: terraform output

  # ─────────────────────────────────────────────
  # Deploy to Prod (manual workflow_dispatch)
  # ─────────────────────────────────────────────
  deploy-prod:
    name: Deploy → Prod
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    environment: prod
    concurrency:
      group: deploy-prod
      cancel-in-progress: false
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (for Lambda build step)
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: NewsSummaries-DeployProd-${{ github.run_id }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=news-summaries/prod/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Apply
        run: |
          terraform apply \
            -var-file="terraform.prod.tfvars" \
            -var="openai_api_key=${{ secrets.TF_VAR_openai_api_key }}" \
            -var="news_api_key=${{ secrets.TF_VAR_news_api_key }}" \
            -var="alert_email=${{ secrets.ALERT_EMAIL }}" \
            -input=false \
            -auto-approve

      - name: Print outputs
        run: terraform output
